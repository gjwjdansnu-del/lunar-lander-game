<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Lunar Lander</title>
  <link rel="stylesheet" href="style.css?__BUILD__">
</head>
<body>
  <div id="app">
    <header id="game-header">
      <h1>Lunar Lander</h1>
      <span class="version">v0.5.6 · __BUILD__</span>
    </header>
    <div id="game-container">
    <canvas id="canvas"></canvas>
    <div id="mode-select">
      <h2>미션 선택</h2>
      <p class="mode-subtitle">난이도를 선택하세요</p>
      <div class="mode-buttons">
        <button class="mode-btn" data-mode="easy">이지 모드</button>
        <button class="mode-btn" data-mode="hard">하드 모드</button>
        <button class="mode-btn" data-mode="real">Real Mission</button>
      </div>
      <p class="mode-desc" id="mode-desc">현재 설정 그대로의 연습 모드입니다.</p>
    </div>
    <div id="hud" class="hidden">
      <div class="hud-row">
        <span class="mode-tag" id="mode-label">이지</span>
        <span>연료: <strong id="fuel">100</strong>%</span>
        <span>고도: <strong id="altitude">0</strong> m</span>
        <span>수평속도: <strong id="vx">0</strong> m/s</span>
        <span>수직속도: <strong id="vy">0</strong> m/s</span>
        <span>자세: <strong id="angle">0</strong>°</span>
      </div>
    </div>
    <div id="overlay" class="hidden">
      <div id="message"></div>
      <div class="overlay-actions">
        <button id="restart-btn">다시 시작</button>
        <button id="lobby-btn">로비로 나가기</button>
      </div>
    </div>
    <div id="controls-hint">
      ↑/W: 추진 &nbsp;|&nbsp; ←→/A/D: 자세 제어
    </div>
    </div>
  </div>
  <script src="game.js?__BUILD__"></script>
</body>
</html>

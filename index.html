<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunar Lander</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="canvas"></canvas>
    <div id="hud">
      <div class="hud-row">
        <span>연료: <strong id="fuel">100</strong>%</span>
        <span>고도: <strong id="altitude">0</strong> m</span>
        <span>수평속도: <strong id="vx">0</strong> m/s</span>
        <span>수직속도: <strong id="vy">0</strong> m/s</span>
        <span>자세: <strong id="angle">0</strong>°</span>
      </div>
    </div>
    <div id="overlay" class="hidden">
      <div id="message"></div>
      <button id="restart-btn">다시 시작</button>
    </div>
    <div id="controls-hint">
      ↑/W: 추진 &nbsp;|&nbsp; ←→/A/D: 자세 제어
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>

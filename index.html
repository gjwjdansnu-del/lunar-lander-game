<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Lunar Lander</title>
  <link rel="stylesheet" href="style.css?__BUILD__">
</head>
<body>
  <div id="app">
    <header id="game-header">
      <h1>Lunar Lander</h1>
      <span class="version">v0.3.3 · __BUILD__</span>
    </header>
    <div id="game-container">
    <canvas id="canvas"></canvas>
    <div id="hud">
      <div class="hud-row">
        <span>연료: <strong id="fuel">20</strong>%</span>
        <span>고도: <strong id="altitude">0</strong> m</span>
        <span>수평속도: <strong id="vx">0</strong> m/s</span>
        <span>수직속도: <strong id="vy">0</strong> m/s</span>
        <span>자세: <strong id="angle">0</strong>°</span>
      </div>
    </div>
    <div id="overlay" class="hidden">
      <div id="message"></div>
      <button id="restart-btn">다시 시작</button>
    </div>
    <div id="controls-hint">
      ↑/W: 추진 &nbsp;|&nbsp; ←→/A/D: 자세 제어
    </div>
    </div>
  </div>
  <script src="game.js?__BUILD__"></script>
</body>
</html>
